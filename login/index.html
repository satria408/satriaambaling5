<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ini Web Satria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                        <rect width="36" height="36" rx="8" fill="#6366F1"/>
                        <path d="M12 14h12v8H12v-8zm2 2v4h8v-4h-8zm-2-4h12v2H12v-2zm0 12h12v2H12v-2z" fill="white"/>
                    </svg>
                </div>
                <h1>Web Satria</h1>
                <p>Silahkan Login Ke Web Satria</p>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="passwordToggle">
                            👁
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox"> Remember this device
                    </label>
                </div>

                <button type="submit" class="login-btn">
                    Sign In
                </button>
            </form>

            <div class="success-message" id="successMessage" style="display:none;">
                <h3>Welcome back</h3>
                <p>Redirecting...</p>
            </div>
        </div>
    </div>

    <script>
    // HANDLE LOGIN + REDIRECT
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();

        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;

        if (username === "" || password === "") {
            alert("Username dan Password wajib diisi!");
            return;
        }

        document.getElementById("successMessage").style.display = "block";

        let halaman = sessionStorage.getItem("halamanSebelumnya");

        setTimeout(() => {
            if (halaman) {
                window.location.href = halaman;
            } else {
                window.location.href = "../index.html";
            }
        }, 1500);
    });
    </script>

</body>
</html>
