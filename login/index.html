<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Web Satria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h1>Web Satria</h1>
        <p>Silahkan Login</p>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username">
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password">
            </div>

            <button type="submit">Login</button>

            <!-- TOMBOL SIGN UP -->
            <button type="button" id="signupBtn">
                Sign Up
            </button>
        </form>

        <div id="successMessage" style="display:none; margin-top:10px;">
            Login berhasil... redirecting
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const form = document.getElementById("loginForm");
    const signupBtn = document.getElementById("signupBtn");

    // SIGN UP
    signupBtn.addEventListener("click", function() {

        let newUsername = prompt("Buat Username:");
        let newPassword = prompt("Buat Password:");

        if (newUsername && newPassword) {

            // simpan akun baru
            localStorage.setItem("username", newUsername);
            localStorage.setItem("password", newPassword);

            alert("Akun berhasil dibuat!");
        }
    });

    // LOGIN
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();

        // ambil akun tersimpan
        let savedUsername = localStorage.getItem("username");
        let savedPassword = localStorage.getItem("password");

        // LOGIN BERHASIL
        if (username === savedUsername && password === savedPassword) {

            // simpan status login
            localStorage.setItem("isLogin", "true");

            // tampilkan pesan sukses
            document.getElementById("successMessage").style.display = "block";

            // redirect ke halaman utama
            setTimeout(function() {
                window.location.href = "../index.html";
            }, 1500);

        } 
        
        // LOGIN GAGAL
        else {
            alert("Username atau Password salah!");
        }

    });

});
</script>

</body>
</html>
