<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Web Satria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <div class="login-header">
            <h1>Web Satria</h1>
            <p>Silahkan Login</p>
        </div>

        <h2 id="welcomeText" style="display:none;">
            Halo <span id="displayUsername"></span>
        </h2>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

            <button type="button" id="signupBtn" class="login-btn">
                Sign Up
            </button>
        </form>

        <div id="successMessage" style="display:none; margin-top:10px;">
            Login berhasil... redirecting
        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const form = document.getElementById("loginForm");
    const signupBtn = document.getElementById("signupBtn");

    const defaultUsername = "heri";
    const defaultPassword = "123";

    signupBtn.addEventListener("click", function() {

        let newUsername = prompt("Buat Username:");
        let newPassword = prompt("Buat Password:");

        if (newUsername && newPassword) {
            localStorage.setItem("username", newUsername);
            localStorage.setItem("password", newPassword);

            alert("Akun berhasil dibuat!");
        }
    });

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();

        let savedUsername = localStorage.getItem("username");
        let savedPassword = localStorage.getItem("password");

        if (
            (username === defaultUsername && password === defaultPassword) ||
            (username === savedUsername && password === savedPassword)
        ) {

            localStorage.setItem("isLogin", "true");

            document.getElementById("welcomeText").style.display = "block";
            document.getElementById("displayUsername").innerText = username;

            document.getElementById("successMessage").style.display = "block";

            setTimeout(function() {
                window.location.href = "../index.html";
            }, 1500);

        } else {
            alert("Username atau Password salah!");
        }
    });

});
</script>

</body>
</html>
